name: Rebrand Guard

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly at 07:00 UTC — catches drift on main even without a PR.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  check-rebrand:
    name: No legacy Zenwork references
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run rebrand guard
        id: guard
        run: node scripts/check-rebrand.mjs

      - name: Upload rebrand guard report
        if: always() && hashFiles('rebrand-guard-report/report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: rebrand-guard-report
          path: rebrand-guard-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Open drift issue (scheduled runs only)
        if: failure() && steps.guard.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = `The nightly rebrand guard detected legacy \`Zenwork\` references on \`${context.ref}\` (commit ${context.sha}).\n\n` +
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
              `- Download the \`rebrand-guard-report\` artifact for full details.\n`;
            try {
              const txt = fs.readFileSync('rebrand-guard-report/report.txt', 'utf8');
              body += `\n<details><summary>report.txt</summary>\n\n\`\`\`\n${txt.slice(0, 60000)}\n\`\`\`\n</details>\n`;
            } catch {}
            const title = `Rebrand guard drift detected (${new Date().toISOString().slice(0,10)})`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rebrand-guard',
              per_page: 1,
            });
            if (existing.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['rebrand-guard'],
              });
            }
