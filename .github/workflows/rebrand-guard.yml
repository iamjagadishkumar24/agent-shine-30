name: Rebrand Guard

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly at 07:00 UTC — catches drift on main even without a PR.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  check-rebrand:
    name: No legacy Zenwork references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run rebrand guard
        id: guard
        run: node scripts/check-rebrand.mjs

      - name: Upload rebrand guard report
        if: failure() && steps.guard.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rebrand-guard-report
          path: rebrand-guard-report/
          if-no-files-found: ignore
          retention-days: 14
