name: Rebrand Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-rebrand:
    name: No legacy Zenwork references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run rebrand guard
        run: node scripts/check-no-zenwork.mjs
