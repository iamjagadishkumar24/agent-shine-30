name: Feedback Email Contract

on:
  pull_request:
    paths:
      - "src/lib/feedback-email.templates.ts"
      - "src/lib/feedback-email.functions.ts"
      - "src/lib/brand.ts"
      - "scripts/verify-feedback-emails.ts"
      - "tests/unit/feedback-email.*.test.ts"
      - "package.json"
      - ".github/workflows/feedback-email-contract.yml"
  push:
    branches: [main]
  schedule:
    # Nightly at 07:15 UTC — runs on the default branch even without a PR
    # so environment drift (dep updates, Node/Bun versions, upstream renders)
    # gets caught within 24 hours.
    - cron: "15 7 * * *"
  workflow_dispatch:

jobs:
  verify:
    name: Verify rendered feedback emails
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      # Redirect artifact output away from the local /mnt/documents path.
      FEEDBACK_EMAIL_VERIFY_OUT_DIR: ${{ github.workspace }}/feedback-email-verification

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Snapshot & narrative unit tests
        id: unit
        run: bun run test:feedback-emails

      - name: Render & assert feedback emails
        id: verify
        run: bun run verify:feedback-emails

      - name: Upload verification artifacts
        # Always try to upload — most useful on failure, but pass runs are handy too.
        if: always() && hashFiles(format('{0}/summary.json', env.FEEDBACK_EMAIL_VERIFY_OUT_DIR)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: feedback-email-verification
          path: ${{ env.FEEDBACK_EMAIL_VERIFY_OUT_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Annotate failure summary
        if: failure()
        run: |
          {
            echo "## Feedback Email Contract failed"
            echo ""
            echo "- Unit tests: ${{ steps.unit.outcome }}"
            echo "- Render/assert: ${{ steps.verify.outcome }}"
            echo ""
            if [ -f "$FEEDBACK_EMAIL_VERIFY_OUT_DIR/summary.json" ]; then
              echo '<details><summary>summary.json</summary>'
              echo ''
              echo '```json'
              cat "$FEEDBACK_EMAIL_VERIFY_OUT_DIR/summary.json"
              echo '```'
              echo '</details>'
            fi
            echo ""
            echo "Download the \`feedback-email-verification\` artifact for full HTML/text renders."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download previous successful baseline (for diff)
        if: failure() && github.event_name == 'schedule'
        id: baseline
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: feedback-email-verification
          workflow: ${{ github.workflow }}
          workflow_conclusion: success
          branch: ${{ github.event.repository.default_branch }}
          path: ${{ github.workspace }}/feedback-email-baseline
          if_no_artifact_found: warn

      - name: Resolve baseline run metadata
        if: failure() && github.event_name == 'schedule'
        id: baseline_meta
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outDir = process.env.FEEDBACK_EMAIL_VERIFY_OUT_DIR;
            const meta = { found: false };
            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: context.workflow,
                branch: context.payload.repository.default_branch,
                status: 'success',
                per_page: 5,
              });
              const run = (data.workflow_runs || []).find(r => r.id !== context.runId);
              if (run) {
                Object.assign(meta, {
                  found: true,
                  run_id: run.id,
                  run_url: run.html_url,
                  head_sha: run.head_sha,
                  head_branch: run.head_branch,
                  event: run.event,
                  created_at: run.created_at,
                  updated_at: run.updated_at,
                });
              }
            } catch (e) {
              core.warning(`Could not resolve baseline run: ${e.message}`);
            }
            fs.mkdirSync(`${outDir}/diffs`, { recursive: true });
            fs.writeFileSync(`${outDir}/diffs/baseline-meta.json`, JSON.stringify(meta, null, 2));
            core.setOutput('found', String(meta.found));



      - name: Compute HTML/text diffs vs baseline
        if: failure() && github.event_name == 'schedule'
        id: diffs
        run: |
          set +e
          CUR="$FEEDBACK_EMAIL_VERIFY_OUT_DIR"
          BASE="${{ github.workspace }}/feedback-email-baseline"
          OUT="$CUR/diffs"
          mkdir -p "$OUT"
          have_baseline=0
          if [ -d "$BASE" ] && ls "$BASE"/*.html >/dev/null 2>&1; then have_baseline=1; fi
          if [ "$have_baseline" -eq 0 ]; then
            echo "no_baseline=1" >> "$GITHUB_OUTPUT"
            echo "No previous successful artifact to diff against." > "$OUT/README.txt"
            exit 0
          fi
          # Per-case unified diffs, capped so a runaway diff cannot blow up the issue body.
          MAX_BYTES=8000
          : > "$OUT/combined.md"
          for f in "$CUR"/*.html "$CUR"/*.txt; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            base="$BASE/$name"
            if [ ! -f "$base" ]; then
              echo -e "\n### \`$name\` — new file (no baseline)\n" >> "$OUT/combined.md"
              continue
            fi
            d=$(diff -u --label "baseline/$name" --label "current/$name" "$base" "$f")
            [ -z "$d" ] && continue
            lang="diff"
            printf '\n### `%s`\n\n```%s\n' "$name" "$lang" >> "$OUT/combined.md"
            printf '%s' "$d" | head -c "$MAX_BYTES" >> "$OUT/combined.md"
            bytes=$(printf '%s' "$d" | wc -c)
            if [ "$bytes" -gt "$MAX_BYTES" ]; then
              printf '\n... [truncated %d of %d bytes — see feedback-email-verification artifact]\n' "$((bytes-MAX_BYTES))" "$bytes" >> "$OUT/combined.md"
            fi
            printf '\n```\n' >> "$OUT/combined.md"
          done
          if [ ! -s "$OUT/combined.md" ]; then
            echo "_No textual differences vs baseline (failure was assertion-only)._" > "$OUT/combined.md"
          fi
          # Cap the whole combined body too.
          head -c 55000 "$OUT/combined.md" > "$OUT/combined.trimmed.md"
          mv "$OUT/combined.trimmed.md" "$OUT/combined.md"
          echo "no_baseline=0" >> "$GITHUB_OUTPUT"


      - name: Compute SHA256 checksums for baseline + current artifacts
        if: always() && github.event_name == 'schedule'
        id: checksums
        run: |
          set -e
          CUR="$FEEDBACK_EMAIL_VERIFY_OUT_DIR"
          BASE="${{ github.workspace }}/feedback-email-baseline"
          OUT="$CUR/diffs"
          mkdir -p "$OUT"

          hash_dir() {
            local dir="$1"
            [ -d "$dir" ] || { echo "[]"; return; }
            ( cd "$dir" && find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.txt' -o -name 'summary.json' \) \
              | sort | while read -r f; do
                  name="${f#./}"
                  sha=$(sha256sum "$f" | awk '{print $1}')
                  size=$(wc -c < "$f" | tr -d ' ')
                  printf '{"name":"%s","sha256":"%s","bytes":%s}\n' "$name" "$sha" "$size"
                done | jq -s '.'
            )
          }

          CUR_JSON=$(hash_dir "$CUR")
          BASE_JSON=$(hash_dir "$BASE")
          jq -n --argjson current "$CUR_JSON" --argjson baseline "$BASE_JSON" \
            '{current:$current, baseline:$baseline}' > "$OUT/checksums.json"

          # Compact markdown table joined by filename (baseline sha | current sha | match?).
          {
            echo "| File | Baseline SHA256 | Current SHA256 | Match |"
            echo "| --- | --- | --- | --- |"
            jq -r '
              ((.baseline // []) | map({key:.name, value:.sha256}) | from_entries) as $b
              | ((.current  // []) | map({key:.name, value:.sha256}) | from_entries) as $c
              | (($b | keys) + ($c | keys)) | unique | .[] as $n
              | ($b[$n] // "—") as $bs
              | ($c[$n] // "—") as $cs
              | "| `\($n)` | `\(($bs|tostring)[0:12])…` | `\(($cs|tostring)[0:12])…` | \(if ($bs==$cs and $bs!="—") then "✅" elif ($bs=="—" or $cs=="—") then "➕/➖" else "❌" end) |"
            ' "$OUT/checksums.json"
          } > "$OUT/checksums.md"

      - name: Persist run history (scheduled)
        if: always() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UNIT_OUTCOME: ${{ steps.unit.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -e
          HIST_BRANCH=feedback-email-history
          HIST_DIR="${{ github.workspace }}/_history"
          OUT="$FEEDBACK_EMAIL_VERIFY_OUT_DIR"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config --global user.email "feedback-email-bot@users.noreply.github.com"
          git config --global user.name  "feedback-email-bot"
          if git clone --branch "$HIST_BRANCH" --depth 1 "$REMOTE" "$HIST_DIR" 2>/dev/null; then
            :
          else
            mkdir -p "$HIST_DIR"
            (
              cd "$HIST_DIR"
              git init -q -b "$HIST_BRANCH"
              git remote add origin "$REMOTE"
              : > history.jsonl
              printf "# Feedback Email Contract history\n\nAppend-only JSONL of every scheduled run.\n" > README.md
              git add .
              git commit -q -m "init history"
            )
          fi

          conclusion="success"
          if [ "$UNIT_OUTCOME" != "success" ] || [ "$VERIFY_OUTCOME" != "success" ]; then
            conclusion="failure"
          fi
          failed=0; total=0
          if [ -f "$OUT/summary.json" ]; then
            failed=$(jq -r '.failed // 0' "$OUT/summary.json")
            total=$(jq -r '.totalCases // 0' "$OUT/summary.json")
          fi
          diffBytes=0
          if [ -f "$OUT/diffs/combined.md" ]; then
            diffBytes=$(wc -c < "$OUT/diffs/combined.md" | tr -d ' ')
          fi
          checksums="[]"
          if [ -f "$OUT/diffs/checksums.json" ]; then
            checksums=$(jq -c '.current // []' "$OUT/diffs/checksums.json")
          fi
          entry=$(jq -cn \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg conclusion "$conclusion" \
            --argjson failed "$failed" \
            --argjson total "$total" \
            --argjson diffBytes "$diffBytes" \
            --argjson checksums "$checksums" \
            '{ts:$ts, run_id:$run_id, run_url:$run_url, sha:$sha, conclusion:$conclusion, failed:$failed, total:$total, diffBytes:$diffBytes, checksums:$checksums}')

          cd "$HIST_DIR"
          echo "$entry" >> history.jsonl
          # Bound file size — keep last 500 entries.
          tail -n 500 history.jsonl > history.jsonl.tmp && mv history.jsonl.tmp history.jsonl
          git add history.jsonl
          git commit -q -m "record run ${{ github.run_id }} ($conclusion)" || true
          # Push; create upstream on first commit to a fresh orphan branch.
          git push -q origin "HEAD:$HIST_BRANCH" || git push -q --set-upstream origin "HEAD:$HIST_BRANCH"

          mkdir -p "$OUT/diffs"
          cp history.jsonl "$OUT/diffs/history.jsonl"

      - name: Compute trend from history (scheduled failures)
        if: failure() && github.event_name == 'schedule'
        run: |
          set -e
          OUT="$FEEDBACK_EMAIL_VERIFY_OUT_DIR"
          HIST="$OUT/diffs/history.jsonl"
          TREND="$OUT/diffs/trend.md"
          mkdir -p "$OUT/diffs"
          if [ ! -f "$HIST" ] || [ ! -s "$HIST" ]; then
            echo "_No history available yet — this is the first recorded run._" > "$TREND"
            exit 0
          fi

          RECENT="$OUT/diffs/history.recent.jsonl"
          tail -n 10 "$HIST" > "$RECENT"

          {
            echo "| # | When (UTC) | Result | Failed / Total | Diff bytes |"
            echo "| --- | --- | --- | --- | --- |"
            i=0
            while IFS= read -r line; do
              i=$((i+1))
              ts=$(echo "$line"      | jq -r '.ts')
              conc=$(echo "$line"    | jq -r '.conclusion')
              failed=$(echo "$line"  | jq -r '.failed')
              total=$(echo "$line"   | jq -r '.total')
              db=$(echo "$line"      | jq -r '.diffBytes')
              run_url=$(echo "$line" | jq -r '.run_url')
              icon="✅"; [ "$conc" != "success" ] && icon="❌"
              echo "| $i | [\`$ts\`]($run_url) | $icon $conc | $failed/$total | $db |"
            done < "$RECENT"
          } > "$TREND"

          # Direction vs previous run (last two entries overall).
          prev_line=$(tail -n 2 "$HIST" | head -n 1)
          cur_line=$(tail -n 1 "$HIST")
          prev_db=$(echo "$prev_line" | jq -r '.diffBytes // 0')
          cur_db=$(echo "$cur_line"  | jq -r '.diffBytes // 0')
          prev_failed=$(echo "$prev_line" | jq -r '.failed // 0')
          cur_failed=$(echo "$cur_line"  | jq -r '.failed // 0')

          arrow() {
            if   [ "$1" -gt "$2" ]; then echo "🔺 increasing (+$(($1-$2)))"
            elif [ "$1" -lt "$2" ]; then echo "🔻 decreasing (-$(($2-$1)))"
            else echo "➖ unchanged"; fi
          }

          # Checksum churn: how many current files changed hash since previous run.
          changed_count=0
          if [ "$(echo "$prev_line" | jq -r '.checksums | type')" = "array" ]; then
            changed_count=$(jq -n \
              --argjson prev "$(echo "$prev_line" | jq '.checksums')" \
              --argjson cur  "$(echo "$cur_line"  | jq '.checksums')" '
                ($prev | map({key:.name, value:.sha256}) | from_entries) as $p
              | ($cur  | map({key:.name, value:.sha256}) | from_entries) as $c
              | [ ($c | keys[]) | select(($p[.] // "") != $c[.]) ] | length
            ')
          fi

          {
            echo ""
            echo "**Trend vs previous run**"
            echo "- Diff bytes: \`$prev_db\` → \`$cur_db\` — $(arrow "$cur_db" "$prev_db")"
            echo "- Failed cases: \`$prev_failed\` → \`$cur_failed\` — $(arrow "$cur_failed" "$prev_failed")"
            echo "- Files with new SHA256 vs previous run: \`$changed_count\`"
          } >> "$TREND"


      - name: Open drift issue (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        env:
          # Configure in repo/org Settings → Variables:
          #   FEEDBACK_EMAIL_OWNER          — GitHub login to auto-assign (e.g. "octocat")
          #   FEEDBACK_EMAIL_OWNER_FALLBACK — optional secondary login
          DRIFT_OWNER: ${{ vars.FEEDBACK_EMAIL_OWNER }}
          DRIFT_OWNER_FALLBACK: ${{ vars.FEEDBACK_EMAIL_OWNER_FALLBACK }}
        with:
          script: |
            const fs = require('fs');
            const outDir = process.env.FEEDBACK_EMAIL_VERIFY_OUT_DIR;

            // ---- Derive severity + scoped labels from summary.json --------------
            let summary = null;
            try { summary = JSON.parse(fs.readFileSync(`${outDir}/summary.json`, 'utf8')); } catch {}

            const failed = summary?.failed ?? 0;
            const total  = summary?.totalCases ?? 0;
            const ratio  = total > 0 ? failed / total : 1;

            let severity = 'severity:low';
            if (ratio >= 0.5 || failed >= 4) severity = 'severity:critical';
            else if (ratio >= 0.25 || failed >= 2) severity = 'severity:high';
            else if (failed >= 1) severity = 'severity:medium';

            const failingIds = new Set((summary?.failures ?? []).map(f => f.case));
            const scopes = new Set();
            for (const id of failingIds) {
              if (id.startsWith('chat-')) scopes.add('scope:chat-email');
              if (id.startsWith('case-')) scopes.add('scope:case-email');
            }

            const labels = [
              'agent-quality',
              'email-contract',
              'feedback-email-contract',
              'drift',
              severity,
              ...scopes,
            ];

            // ---- Owner assignment ----------------------------------------------
            const assignees = [process.env.DRIFT_OWNER, process.env.DRIFT_OWNER_FALLBACK]
              .filter(Boolean)
              .map(s => s.replace(/^@/, '').trim())
              .filter(Boolean);

            // ---- Body -----------------------------------------------------------
            let body =
              `The nightly feedback email contract check failed on \`${context.ref}\` (commit ${context.sha}).\n\n` +
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
              `- Failed cases: **${failed}/${total}** (severity: \`${severity.split(':')[1]}\`)\n` +
              `- Artifact: \`feedback-email-verification\` (rendered HTML/text)\n`;
            if (summary) {
              body += `\n<details><summary>summary.json</summary>\n\n\`\`\`json\n${JSON.stringify(summary, null, 2).slice(0, 30000)}\n\`\`\`\n</details>\n`;
            }

            // Baseline provenance so the diff comparison is auditable.
            let baselineMeta = null;
            try { baselineMeta = JSON.parse(fs.readFileSync(`${outDir}/diffs/baseline-meta.json`, 'utf8')); } catch {}
            if (baselineMeta?.found) {
              body +=
                `\n**Baseline compared against**\n` +
                `- Run: [${baselineMeta.run_id}](${baselineMeta.run_url}) (event: \`${baselineMeta.event}\`)\n` +
                `- Commit: \`${baselineMeta.head_sha}\` on \`${baselineMeta.head_branch}\`\n` +
                `- Finished: \`${baselineMeta.updated_at}\` (started \`${baselineMeta.created_at}\`)\n`;
            } else {
              body += `\n_No previous successful nightly run found — diff comparison unavailable._\n`;
            }

            // Inline HTML/text diffs vs the previous successful nightly artifact.
            try {
              const diff = fs.readFileSync(`${outDir}/diffs/combined.md`, 'utf8');
              if (diff.trim()) {
                body += `\n<details open><summary>HTML / text diff vs last green nightly</summary>\n\n${diff.slice(0, 55000)}\n</details>\n`;
              }
            } catch {
              if (baselineMeta?.found) {
                body += `\n_Baseline run resolved but no diff file was produced._\n`;
              }
            }

            // SHA256 checksums of the exact files compared, so the diff inputs are auditable.
            try {
              const checksumsMd = fs.readFileSync(`${outDir}/diffs/checksums.md`, 'utf8');
              const checksumsJson = fs.readFileSync(`${outDir}/diffs/checksums.json`, 'utf8');
              if (checksumsMd.trim()) {
                body +=
                  `\n<details><summary>SHA256 checksums (baseline vs current)</summary>\n\n` +
                  `${checksumsMd.slice(0, 20000)}\n\n` +
                  `<details><summary>Raw checksums.json</summary>\n\n\`\`\`json\n${checksumsJson.slice(0, 20000)}\n\`\`\`\n</details>\n` +
                  `</details>\n`;
              }
            } catch {}



            const title = `Feedback email contract drift (${new Date().toISOString().slice(0,10)})`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'feedback-email-contract',
              per_page: 1,
            });

            if (existing.length) {
              const num = existing[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: num, body,
              });
              // Refresh labels: drop stale severity:/scope: and re-apply current set.
              const keep = (existing[0].labels || [])
                .map(l => (typeof l === 'string' ? l : l.name))
                .filter(n => n && !n.startsWith('severity:') && !n.startsWith('scope:'));
              await github.rest.issues.setLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: num,
                labels: Array.from(new Set([...keep, ...labels])),
              });
              if (assignees.length) {
                try {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: num, assignees,
                  });
                } catch (e) { core.warning(`Assignee update failed: ${e.message}`); }
              }
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels,
                assignees: assignees.length ? assignees : undefined,
              });
              if (assignees.length && !created.data.assignees?.length) {
                core.warning(`Issue created but assignees not applied (verify ${assignees.join(', ')} have repo access).`);
              }
            }
