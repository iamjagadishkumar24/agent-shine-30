name: Feedback Email Contract

on:
  pull_request:
    paths:
      - "src/lib/feedback-email.templates.ts"
      - "src/lib/feedback-email.functions.ts"
      - "src/lib/brand.ts"
      - "scripts/verify-feedback-emails.ts"
      - "tests/unit/feedback-email.*.test.ts"
      - "package.json"
      - ".github/workflows/feedback-email-contract.yml"
  push:
    branches: [main]
  schedule:
    # Nightly at 07:15 UTC — runs on the default branch even without a PR
    # so environment drift (dep updates, Node/Bun versions, upstream renders)
    # gets caught within 24 hours.
    - cron: "15 7 * * *"
  workflow_dispatch:

jobs:
  verify:
    name: Verify rendered feedback emails
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      # Redirect artifact output away from the local /mnt/documents path.
      FEEDBACK_EMAIL_VERIFY_OUT_DIR: ${{ github.workspace }}/feedback-email-verification

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Snapshot & narrative unit tests
        id: unit
        run: bun run test:feedback-emails

      - name: Render & assert feedback emails
        id: verify
        run: bun run verify:feedback-emails

      - name: Upload verification artifacts
        # Always try to upload — most useful on failure, but pass runs are handy too.
        if: always() && hashFiles(format('{0}/summary.json', env.FEEDBACK_EMAIL_VERIFY_OUT_DIR)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: feedback-email-verification
          path: ${{ env.FEEDBACK_EMAIL_VERIFY_OUT_DIR }}
          if-no-files-found: warn
          retention-days: 14

      - name: Annotate failure summary
        if: failure()
        run: |
          {
            echo "## Feedback Email Contract failed"
            echo ""
            echo "- Unit tests: ${{ steps.unit.outcome }}"
            echo "- Render/assert: ${{ steps.verify.outcome }}"
            echo ""
            if [ -f "$FEEDBACK_EMAIL_VERIFY_OUT_DIR/summary.json" ]; then
              echo '<details><summary>summary.json</summary>'
              echo ''
              echo '```json'
              cat "$FEEDBACK_EMAIL_VERIFY_OUT_DIR/summary.json"
              echo '```'
              echo '</details>'
            fi
            echo ""
            echo "Download the \`feedback-email-verification\` artifact for full HTML/text renders."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download previous successful baseline (for diff)
        if: failure() && github.event_name == 'schedule'
        id: baseline
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          name: feedback-email-verification
          workflow: ${{ github.workflow }}
          workflow_conclusion: success
          branch: ${{ github.event.repository.default_branch }}
          path: ${{ github.workspace }}/feedback-email-baseline
          if_no_artifact_found: warn

      - name: Resolve baseline run metadata
        if: failure() && github.event_name == 'schedule'
        id: baseline_meta
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outDir = process.env.FEEDBACK_EMAIL_VERIFY_OUT_DIR;
            const meta = { found: false };
            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: context.workflow,
                branch: context.payload.repository.default_branch,
                status: 'success',
                per_page: 5,
              });
              const run = (data.workflow_runs || []).find(r => r.id !== context.runId);
              if (run) {
                Object.assign(meta, {
                  found: true,
                  run_id: run.id,
                  run_url: run.html_url,
                  head_sha: run.head_sha,
                  head_branch: run.head_branch,
                  event: run.event,
                  created_at: run.created_at,
                  updated_at: run.updated_at,
                });
              }
            } catch (e) {
              core.warning(`Could not resolve baseline run: ${e.message}`);
            }
            fs.mkdirSync(`${outDir}/diffs`, { recursive: true });
            fs.writeFileSync(`${outDir}/diffs/baseline-meta.json`, JSON.stringify(meta, null, 2));
            core.setOutput('found', String(meta.found));



      - name: Compute HTML/text diffs vs baseline
        if: failure() && github.event_name == 'schedule'
        id: diffs
        run: |
          set +e
          CUR="$FEEDBACK_EMAIL_VERIFY_OUT_DIR"
          BASE="${{ github.workspace }}/feedback-email-baseline"
          OUT="$CUR/diffs"
          mkdir -p "$OUT"
          have_baseline=0
          if [ -d "$BASE" ] && ls "$BASE"/*.html >/dev/null 2>&1; then have_baseline=1; fi
          if [ "$have_baseline" -eq 0 ]; then
            echo "no_baseline=1" >> "$GITHUB_OUTPUT"
            echo "No previous successful artifact to diff against." > "$OUT/README.txt"
            exit 0
          fi
          # Per-case unified diffs, capped so a runaway diff cannot blow up the issue body.
          MAX_BYTES=8000
          : > "$OUT/combined.md"
          for f in "$CUR"/*.html "$CUR"/*.txt; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            base="$BASE/$name"
            if [ ! -f "$base" ]; then
              echo -e "\n### \`$name\` — new file (no baseline)\n" >> "$OUT/combined.md"
              continue
            fi
            d=$(diff -u --label "baseline/$name" --label "current/$name" "$base" "$f")
            [ -z "$d" ] && continue
            lang="diff"
            printf '\n### `%s`\n\n```%s\n' "$name" "$lang" >> "$OUT/combined.md"
            printf '%s' "$d" | head -c "$MAX_BYTES" >> "$OUT/combined.md"
            bytes=$(printf '%s' "$d" | wc -c)
            if [ "$bytes" -gt "$MAX_BYTES" ]; then
              printf '\n... [truncated %d of %d bytes — see feedback-email-verification artifact]\n' "$((bytes-MAX_BYTES))" "$bytes" >> "$OUT/combined.md"
            fi
            printf '\n```\n' >> "$OUT/combined.md"
          done
          if [ ! -s "$OUT/combined.md" ]; then
            echo "_No textual differences vs baseline (failure was assertion-only)._" > "$OUT/combined.md"
          fi
          # Cap the whole combined body too.
          head -c 55000 "$OUT/combined.md" > "$OUT/combined.trimmed.md"
          mv "$OUT/combined.trimmed.md" "$OUT/combined.md"
          echo "no_baseline=0" >> "$GITHUB_OUTPUT"


      - name: Open drift issue (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        env:
          # Configure in repo/org Settings → Variables:
          #   FEEDBACK_EMAIL_OWNER          — GitHub login to auto-assign (e.g. "octocat")
          #   FEEDBACK_EMAIL_OWNER_FALLBACK — optional secondary login
          DRIFT_OWNER: ${{ vars.FEEDBACK_EMAIL_OWNER }}
          DRIFT_OWNER_FALLBACK: ${{ vars.FEEDBACK_EMAIL_OWNER_FALLBACK }}
        with:
          script: |
            const fs = require('fs');
            const outDir = process.env.FEEDBACK_EMAIL_VERIFY_OUT_DIR;

            // ---- Derive severity + scoped labels from summary.json --------------
            let summary = null;
            try { summary = JSON.parse(fs.readFileSync(`${outDir}/summary.json`, 'utf8')); } catch {}

            const failed = summary?.failed ?? 0;
            const total  = summary?.totalCases ?? 0;
            const ratio  = total > 0 ? failed / total : 1;

            let severity = 'severity:low';
            if (ratio >= 0.5 || failed >= 4) severity = 'severity:critical';
            else if (ratio >= 0.25 || failed >= 2) severity = 'severity:high';
            else if (failed >= 1) severity = 'severity:medium';

            const failingIds = new Set((summary?.failures ?? []).map(f => f.case));
            const scopes = new Set();
            for (const id of failingIds) {
              if (id.startsWith('chat-')) scopes.add('scope:chat-email');
              if (id.startsWith('case-')) scopes.add('scope:case-email');
            }

            const labels = [
              'agent-quality',
              'email-contract',
              'feedback-email-contract',
              'drift',
              severity,
              ...scopes,
            ];

            // ---- Owner assignment ----------------------------------------------
            const assignees = [process.env.DRIFT_OWNER, process.env.DRIFT_OWNER_FALLBACK]
              .filter(Boolean)
              .map(s => s.replace(/^@/, '').trim())
              .filter(Boolean);

            // ---- Body -----------------------------------------------------------
            let body =
              `The nightly feedback email contract check failed on \`${context.ref}\` (commit ${context.sha}).\n\n` +
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
              `- Failed cases: **${failed}/${total}** (severity: \`${severity.split(':')[1]}\`)\n` +
              `- Artifact: \`feedback-email-verification\` (rendered HTML/text)\n`;
            if (summary) {
              body += `\n<details><summary>summary.json</summary>\n\n\`\`\`json\n${JSON.stringify(summary, null, 2).slice(0, 30000)}\n\`\`\`\n</details>\n`;
            }

            // Baseline provenance so the diff comparison is auditable.
            let baselineMeta = null;
            try { baselineMeta = JSON.parse(fs.readFileSync(`${outDir}/diffs/baseline-meta.json`, 'utf8')); } catch {}
            if (baselineMeta?.found) {
              body +=
                `\n**Baseline compared against**\n` +
                `- Run: [${baselineMeta.run_id}](${baselineMeta.run_url}) (event: \`${baselineMeta.event}\`)\n` +
                `- Commit: \`${baselineMeta.head_sha}\` on \`${baselineMeta.head_branch}\`\n` +
                `- Finished: \`${baselineMeta.updated_at}\` (started \`${baselineMeta.created_at}\`)\n`;
            } else {
              body += `\n_No previous successful nightly run found — diff comparison unavailable._\n`;
            }

            // Inline HTML/text diffs vs the previous successful nightly artifact.
            try {
              const diff = fs.readFileSync(`${outDir}/diffs/combined.md`, 'utf8');
              if (diff.trim()) {
                body += `\n<details open><summary>HTML / text diff vs last green nightly</summary>\n\n${diff.slice(0, 55000)}\n</details>\n`;
              }
            } catch {
              if (baselineMeta?.found) {
                body += `\n_Baseline run resolved but no diff file was produced._\n`;
              }
            }



            const title = `Feedback email contract drift (${new Date().toISOString().slice(0,10)})`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'feedback-email-contract',
              per_page: 1,
            });

            if (existing.length) {
              const num = existing[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: num, body,
              });
              // Refresh labels: drop stale severity:/scope: and re-apply current set.
              const keep = (existing[0].labels || [])
                .map(l => (typeof l === 'string' ? l : l.name))
                .filter(n => n && !n.startsWith('severity:') && !n.startsWith('scope:'));
              await github.rest.issues.setLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: num,
                labels: Array.from(new Set([...keep, ...labels])),
              });
              if (assignees.length) {
                try {
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: num, assignees,
                  });
                } catch (e) { core.warning(`Assignee update failed: ${e.message}`); }
              }
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels,
                assignees: assignees.length ? assignees : undefined,
              });
              if (assignees.length && !created.data.assignees?.length) {
                core.warning(`Issue created but assignees not applied (verify ${assignees.join(', ')} have repo access).`);
              }
            }
