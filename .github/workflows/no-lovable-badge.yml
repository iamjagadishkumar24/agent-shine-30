name: No Lovable Badge

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "tests/e2e/no_lovable_badge*.spec.py"
      - ".github/workflows/no-lovable-badge.yml"
  schedule:
    # Daily at 06:30 UTC — catches any regression from platform-side badge changes.
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Published URL to audit"
        required: false
        default: "https://agent-shine-30.lovable.app"

jobs:
  badge-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.48.0
          python -m playwright install --with-deps chromium

      - name: Run badge DOM + screenshot guard
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://agent-shine-30.lovable.app' }}
        run: python3 tests/e2e/no_lovable_badge.spec.py

      - name: Upload badge guard screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: no-lovable-badge-screenshots
          path: tests/e2e/screenshots/no_lovable_badge/**
          if-no-files-found: ignore
          retention-days: 14
