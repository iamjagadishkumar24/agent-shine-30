name: No Lovable Badge

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "tests/e2e/no_lovable_badge*.spec.py"
      - ".github/workflows/no-lovable-badge.yml"
  schedule:
    # Daily at 06:30 UTC — catches any regression from platform-side badge changes.
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override URL to audit (leave blank to run both staging + production)"
        required: false
        default: ""

jobs:
  badge-guard:
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: staging
            # Stable preview URL — always serves the latest preview build.
            url: https://project--ee9ab798-a4f8-4621-a924-2bc91cf49061-dev.lovable.app
          - name: production
            # Stable published URL.
            url: https://agent-shine-30.lovable.app
    name: badge-guard (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + imaging deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright==1.48.0 Pillow==10.4.0 numpy==2.1.1
          python -m playwright install --with-deps chromium

      - name: Run badge DOM + screenshot guard
        env:
          BASE_URL: ${{ github.event.inputs.base_url || matrix.target.url }}
        run: python3 tests/e2e/no_lovable_badge.spec.py

      - name: Run visual diff guard (screenshot vs baseline)
        env:
          BASE_URL: ${{ github.event.inputs.base_url || matrix.target.url }}
          TARGET: ${{ matrix.target.name }}
          DIFF_THRESHOLD: "8.0"
        run: python3 tests/e2e/badge_visual_diff.py

      - name: Upload badge guard screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: no-lovable-badge-${{ matrix.target.name }}
          path: tests/e2e/screenshots/no_lovable_badge/**
          if-no-files-found: ignore
          retention-days: 14
